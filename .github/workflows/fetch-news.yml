name: 每日涉华新闻抓取

on:
  push:
    branches: [master]
  schedule:
    # 每天 UTC 8:00 = 北京时间 16:00 运行（一天新闻基本出齐）
    - cron: '0 8 * * *'
  # 也支持手动触发
  workflow_dispatch:

# 权限：需要写入仓库来保存结果
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install feedparser

      - name: 抓取新闻（RSS + Google News）
        run: python fetch_news.py --days 1 --source all --workers 5 --output raw_news.json

      - name: 生成 HTML 报告
        run: python build_report.py raw_news.json

      - name: 设置页面
        uses: actions/configure-pages@v4

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: news_output/

      - name: 提交结果到仓库
        run: |
          git config user.name "News Bot"
          git config user.email "news-bot@github.com"
          git add news_output/
          git diff --staged --quiet || git commit -m "📰 $(date +%Y-%m-%d) 新闻更新"
          git push

  deploy:
    needs: fetch-and-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
