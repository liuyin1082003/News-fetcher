name: 每日涉华新闻抓取

on:
  push:
    branches: [master]
  schedule:
    # 北京时间 8:00-23:30，每30分钟跑一次（UTC 0:00-15:30）
    # GitHub cron 延迟不可控，32次/天的高频 + 幂等检查 = 确保命中
    - cron: '*/30 0-15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查今天是否已抓取
        id: check
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          if [ -f "news_output/news_${TODAY}.html" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ 今天($TODAY)已有数据，跳过抓取"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📰 今天($TODAY)尚无数据，开始抓取"
          fi

      - name: 安装 Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        if: steps.check.outputs.exists == 'false'
        run: pip install feedparser

      - name: 抓取新闻（RSS + Google News）
        if: steps.check.outputs.exists == 'false'
        run: python fetch_news.py --days 1 --source all --workers 5 --output raw_news.json

      - name: 生成 HTML 报告（日报 + 日期导航首页）
        if: steps.check.outputs.exists == 'false'
        run: |
          python build_report.py raw_news.json liuyin1082003/News-fetcher --date ${{ steps.check.outputs.today }}
          cp news_output/index.html index.html
          cp news_output/news_*.html . 2>/dev/null || true

      - name: 提交结果到仓库
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "News Bot"
          git config user.email "news-bot@github.com"
          git add news_output/ index.html news_*.html
          git diff --staged --quiet || git commit -m "📰 $(TZ='Asia/Shanghai' date +%Y-%m-%d) 新闻更新"
          git push
